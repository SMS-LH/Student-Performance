services:
  - type: web
    name: school-api
    env: python
    region: frankfurt
    buildCommand: |
      pip install --upgrade pip
      pip install -r api/requirements_api.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: web
    name: school-dashboard
    env: python
    region: frankfurt
    buildCommand: |
      pip install --upgrade pip
      pip install -r dashboard/requirements_ui.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: API_URL
        value: https://school-api.onrender.com/predict
      - key: PYTHON_VERSION
        value: 3.12.0