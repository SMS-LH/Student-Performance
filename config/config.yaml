# =============================================================================
# Configuration du projet Student Performance
# =============================================================================

# -----------------------------------------------------------------------------
# Chemins
# -----------------------------------------------------------------------------
paths:
  raw_data: "data/raw/StudentPerformanceFactors.csv"
  processed_data: "data/processed/"
  models: "models/"
  mlflow_tracking_uri: "sqlite:///mlflow.db"

# -----------------------------------------------------------------------------
# Données
# -----------------------------------------------------------------------------
data:
  target: "Exam_Score"
  random_state: 42
  test_size: 0.3

  numeric_features:
    - Hours_Studied
    - Attendance
    - Sleep_Hours
    - Previous_Scores
    - Tutoring_Sessions
    - Physical_Activity

  ordinal_features:
    Parental_Involvement:
      categories: [Low, Medium, High]
    Access_to_Resources:
      categories: [Low, Medium, High]
    Motivation_Level:
      categories: [Low, Medium, High]
    Family_Income:
      categories: [Low, Medium, High]
    Teacher_Quality:
      categories: [Low, Medium, High]
    Peer_Influence:
      categories: [Negative, Neutral, Positive]
    Parental_Education_Level:
      categories: [High School, College, Postgraduate]
    Distance_from_Home:
      categories: [Near, Moderate, Far]

  nominal_features:
    - Extracurricular_Activities
    - Internet_Access
    - School_Type
    - Learning_Disabilities
    - Gender

# -----------------------------------------------------------------------------
# Prétraitement
# -----------------------------------------------------------------------------
preprocessing:
  cap_exam_score: 100
  imputation_strategy: "most_frequent"
  onehot_drop: "first"

# -----------------------------------------------------------------------------
# Modélisation
# -----------------------------------------------------------------------------
modeling:
  models_to_test:
    - linear_regression
    - ridge
    - lasso
    - elastic_net
    - knn
    - decision_tree
    - random_forest
    - xgboost
    - lightgbm

  cv_folds: 5
  scoring: "neg_mean_absolute_error"

  # Hyperparamètres à optimiser (grilles)
  hyperparameters:
    ridge:
      alpha: [0.01, 0.1, 1.0, 10.0, 100.0]
    lasso:
      alpha: [0.001, 0.01, 0.1, 1.0, 10.0]
    elastic_net:
      alpha: [0.01, 0.1, 1.0, 10.0]
      l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
    random_forest:
      n_estimators: [100, 200, 300]
      max_depth: [5, 10, 15, null]
      min_samples_split: [2, 5, 10]
      min_samples_leaf: [1, 2, 4]
    xgboost:
      n_estimators: [100, 200, 300]
      learning_rate: [0.01, 0.05, 0.1]
      max_depth: [3, 5, 7]
    lightgbm:
      n_estimators: [100, 200, 300]
      learning_rate: [0.01, 0.05, 0.1]
      max_depth: [3, 5, -1]
      num_leaves: [31, 50, 70]

# -----------------------------------------------------------------------------
# API
# -----------------------------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000

# -----------------------------------------------------------------------------
# Dashboard
# -----------------------------------------------------------------------------
dashboard:
  title: "EduPredict - Suivi des Élèves"
  api_url: "http://127.0.0.1:8000/predict"